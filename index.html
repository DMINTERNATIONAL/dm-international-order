/* ─── Recommendation Logic ─── */
function getRecommendation(ans) {
  const { condition, desired, length, habit } = ans;
  let pids = []; let reasons = []; let interp = "";
  const prods = P.ko;

  if (condition==="dry" && desired==="glossy") interp="건조함은 잡되 무겁지 않게, 윤기를 더해 깔끔하게 정리하는 스타일이 잘 어울립니다.";
  else if (condition==="curl-loss") interp="컬이 쉽게 풀리는 타입이라 탄력을 유지해주는 제품이 필요합니다. 자연스러운 웨이브를 살려보세요.";
  else if (condition==="flat") interp="볼륨이 부족한 모발이라 뿌리를 세우고 가볍게 움직이는 스타일이 잘 어울려요.";
  else if (condition==="dry") interp="지금 모발은 수분 보충이 먼저입니다. 가볍게 윤기를 더하면서 결을 정리해보세요.";
  else if (desired==="texture") interp="컬과 텍스처를 강조하면 개성 있는 스타일을 연출할 수 있어요.";
  else if (desired==="hold") interp="형태감을 오래 유지하는 것이 포인트입니다. 고정력 있는 제품으로 마무리하세요.";
  else if (desired==="natural") interp="지금 모발은 가볍게 살리면서 형태감을 잡아주는 스타일이 잘 어울립니다.";
  else if (desired==="volume") interp="뿌리부터 볼륨을 살리면 전체적으로 공기감 있는 스타일이 완성됩니다.";
  else interp="현재 모발 상태에 맞게 자연스럽고 건강한 느낌의 스타일을 추천드립니다.";

  // Product selection (using product IDs 1-8 matching P.ko)
  if (condition==="dry"||desired==="glossy") { pids.push(2); reasons.push("건조함을 잡고 윤기를 더하기 위해"); }
  if (condition==="curl-loss"||desired==="texture") { pids.push(1); reasons.push("컬 유지력을 높이고 탄력을 살리기 위해"); }
  if (condition==="flat"||desired==="volume") { pids.push(4); reasons.push("뿌리 볼륨을 살려 공기감을 더하기 위해"); }
  if (desired==="hold"&&length==="short") { pids.push(3); reasons.push("형태를 잡고 자연스럽게 고정하기 위해"); }
  if (desired==="hold"&&!pids.includes(5)&&!pids.includes(6)) { pids.push(5); reasons.push("하루 종일 스타일을 유지하기 위해"); }
  if (length==="short"&&condition==="dull"&&!pids.includes(3)) { pids.push(3); reasons.push("매트한 질감으로 형태감을 살리기 위해"); }
  if (length==="long"&&(desired==="natural"||desired==="glossy")&&!pids.includes(7)) { pids.push(7); reasons.push("자연스러운 움직임을 유지하기 위해"); }
  if (condition==="dry"&&condition==="curl-loss") { if(!pids.includes(2)) pids.push(2); if(!pids.includes(1)) pids.push(1); }
  if (condition==="flat"&&length==="long") { if(!pids.includes(4)) pids.push(4); if(!pids.includes(7)) pids.push(7); }

  if (habit==="none") { pids=pids.slice(0,1); reasons=reasons.slice(0,1); }
  pids=pids.slice(0,3); reasons=reasons.slice(0,3);
  if (pids.length===0) { pids=[2]; reasons=["모발 결을 정리하고 기본적인 윤기를 더하기 위해"]; }

  const stepDesc = {1:"컬 형태 살리기",2:"결 정리 & 윤기",3:"형태 잡기",4:"뿌리 볼륨 업",5:"강력 고정",6:"강력 고정",7:"자연스러운 유지",8:"자연스러운 유지"};
  const recProds = pids.map(id=>prods.find(p=>p.id===id)).filter(Boolean);
  const steps = recProds.map((p,i)=>({step:i+1,product:p.name,action:stepDesc[p.id]||"스타일링",img:p.img}));
  return { interp, pids, reasons, steps, recProds };
}

/* ─── App ─── */
const App = function App() {
  const [lang, setLang] = useState(null);
  const [hiding, setHiding] = useState(false);
  const [page, setPage] = useState("home"); // home, products, diagnosis, result, routine, care
  const [cat, setCat] = useState(null);
  const [q, setQ] = useState("");
  const [sel, setSel] = useState(null);
  const [mO, setMO] = useState(false);
  const [sTo, setSTo] = useState(null);
  const ref = useRef(null);

  // Diagnosis state
  const [diagStep, setDiagStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const [recommendation, setRecommendation] = useState(null);
  // Routine state
  const [routineProds, setRoutineProds] = useState(null);
  // Care state
  const [careTab, setCareTab] = useState("perm");

  const t = T[lang] || T.ko;
  const prods = P[lang] || P.ko;
  const koProds = P.ko;
  const allL = t.all;
  const cats = [allL, ...new Set(prods.map(p => p.cat))];
  const curC = cat || allL;
  const catList = [...new Set(prods.map(p => p.cat))];

  const fil = prods.filter(p => {
    const mc = curC === allL || p.cat === curC;
    const s = q.toLowerCase();
    return mc && (!s || p.name.toLowerCase().includes(s) || p.short.toLowerCase().includes(s) || p.cat.toLowerCase().includes(s) || (p.brand && p.brand.toLowerCase().includes(s)) || p.feat.some(f => f.toLowerCase().includes(s)));
  });
  const grp = {};
  fil.forEach(p => { if (!grp[p.cat]) grp[p.cat] = []; grp[p.cat].push(p); });

  const openD = (p, s = null) => { setSel(p); setSTo(s); setMO(true); };
  const closeD = () => { setMO(false); setTimeout(() => { setSel(null); setSTo(null); }, 350); };

  useEffect(() => {
    if (mO && sTo && ref.current) setTimeout(() => {
      const el = ref.current.querySelector(`[data-s="${sTo}"]`);
      if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    }, 400);
  }, [mO, sTo]);
  useEffect(() => { document.body.style.overflow = mO ? "hidden" : ""; return () => { document.body.style.overflow = ""; }; }, [mO]);

  const gn = (s) => s[lang] || s.ko;
  const selL = c => { setHiding(true); setTimeout(() => { setLang(c); setCat(null); setHiding(false); }, 400); };

  const goPage = (p) => { setPage(p); window.scrollTo(0,0); };
  const startDiag = () => { setDiagStep(0); setAnswers({}); setRecommendation(null); goPage("diagnosis"); };
  const handleDiagAnswer = (key, val) => {
    const na = {...answers, [key]:val};
    setAnswers(na);
    if (diagStep < QUESTIONS.length-1) setTimeout(()=>setDiagStep(diagStep+1),250);
    else { const rec = getRecommendation(na); setRecommendation(rec); setTimeout(()=>goPage("result"),300); }
  };
  const goRoutine = (pids) => { setRoutineProds(pids); goPage("routine"); };

  // Language select
  if (!lang) return (
    <><style>{css}</style>
    <div className={`ls ${hiding?"h":""}`}>
      <img className="ls-logo" src={LOGO_SRC} alt="DAY:MEAN"/>
      <div className="ls-t">언어를 선택해주세요</div>
      <div className="ls-ts">Select your language</div>
      <div className="ls-opts">
        {[["ko","한국어"],["en","English"],["zh","中文"],["ja","日本語"]].map(([c,l])=>(
          <button key={c} className="ls-b" onClick={()=>selL(c)}>{l}</button>
        ))}
      </div>
    </div></>
  );

  /* ─── PAGE: Diagnosis ─── */
  if (page === "diagnosis") {
    const qData = QUESTIONS[diagStep];
    const progress = ((diagStep+1)/QUESTIONS.length)*100;
    return (
      <><style>{css}</style>
      <div className="app diag-wrap">
        <div className="diag-head">
          <button className="diag-back" onClick={()=>goPage("home")}><BkI/></button>
          <span style={{fontSize:14,color:'var(--t2)'}}>헤어 타입 진단</span>
        </div>
        <div className="diag-progress"><div className="diag-fill" style={{width:`${progress}%`}}/></div>
        <div className="diag-body" key={diagStep}>
          <div className="diag-qn fu">Q{diagStep+1} / {QUESTIONS.length}</div>
          <div className="diag-qt fu" style={{animationDelay:'.05s'}}>{qData.title}</div>
          <div className="diag-qs fu" style={{animationDelay:'.1s'}}>{qData.sub}</div>
          <div className="diag-opts">
            {qData.opts.map((o,i)=>(
              <button key={o.v} className={`diag-opt fu ${answers[qData.key]===o.v?"sel":""}`} style={{animationDelay:`${.12+i*.04}s`}} onClick={()=>handleDiagAnswer(qData.key,o.v)}>{o.l}</button>
            ))}
          </div>
        </div>
      </div></>
    );
  }

  /* ─── PAGE: Result ─── */
  if (page === "result" && recommendation) {
    const { interp, pids, reasons, steps, recProds } = recommendation;
    return (
      <><style>{css}</style>
      <div className="app res-wrap">
        <div className="res-head">
          <button className="diag-back" onClick={()=>goPage("home")}><BkI/></button>
          <span style={{fontSize:14,color:'var(--t2)'}}>진단 결과</span>
        </div>
        <div className="res-interp fu">
          <div className="res-interp-label">당신의 모발 타입</div>
          <div className="res-interp-text">{interp}</div>
        </div>
        <div className="res-section fu" style={{animationDelay:'.1s'}}>
          <div className="res-stitle">추천 제품</div>
          {recProds.map((p,i)=>(
            <div key={p.id} className="res-prod" onClick={()=>openD(p)}>
              <div className="res-prod-img">{p.img?<img src={p.img} alt={p.name}/>:<span style={{fontSize:11,color:'var(--aw)',opacity:.5}}>{p.brand}</span>}</div>
              <div className="res-prod-info">
                <div className="res-prod-name">{p.name}</div>
                <div className="res-prod-reason">{reasons[i]}</div>
              </div>
              <div className="pca"><AI2/></div>
            </div>
          ))}
        </div>
        <div className="res-section fu" style={{animationDelay:'.15s'}}>
          <div className="res-stitle">사용 순서</div>
          {steps.map((s,i)=>(
            <div key={i} className="res-step">
              <div className="res-step-num">{s.step}</div>
              {i<steps.length-1 && <div className="res-step-line"/>}
              <div><div className="res-step-t">{s.product}</div><div className="res-step-s">{s.action}</div></div>
            </div>
          ))}
        </div>
        <div className="res-section fu" style={{animationDelay:'.2s'}}>
          <div className="res-stitle">스타일링 팁</div>
          <div className="res-tip"><p>💡 필요한 부분 중심으로 소량씩 사용하는 것이 중요합니다.</p></div>
          <div className="res-tip"><p>💡 마지막 단계에서 소량 추가하면 완성도가 높아집니다.</p></div>
        </div>
        <div className="res-section fu" style={{animationDelay:'.25s'}}>

      <div className="dsec" data-s="tip"><div className="dstt">{t.tip}</div><div className="dtpc"><p className="dtpt">{sel.tip}</p></div></div>
      <div className="dsec"><div className="dstt">{t.caut}</div><div className="dcac"><div className="dcah"><CaI/><span className="dcal">{t.cautN}</span></div>{sel.caut.map((c2,i)=><div key={i} className="dcit"><span className="dcda">–</span><span className="dctx">{c2}</span></div>)}</div></div>
      <div className="ddm"><p className="ddmt">{t.dmD}</p><div className="ddmh"><a className="ddmc" href={staff.head.url} target="_blank" rel="noopener noreferrer">{gn(staff.head)} {staff.head.handle}</a>{staff.interns.map((s,i)=><a key={i} className="ddmc" href={s.url} target="_blank" rel="noopener noreferrer">{gn(s)} {s.handle}</a>)}</div></div>
    </div>
  </>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
