<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>DM INTERNATIONAL 발주 관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
#ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:none;align-items:center;justify-content:center;padding:16px}
#ob{background:#fff;border-radius:16px;padding:28px 24px;max-width:480px;width:100%;position:relative;z-index:1000}
#ob h2{font-size:17px;font-weight:700;margin-bottom:6px}
#ob p{font-size:13px;color:#555;line-height:1.7;margin-bottom:14px}
.step{background:#f5f5f5;border-radius:10px;padding:14px;margin-bottom:10px}
.step b{font-size:12px;font-weight:700;color:#1a1a1a;display:block;margin-bottom:4px}
.step span,.step a{font-size:12px;color:#555;line-height:1.6}
.step code{background:#e8e8e8;padding:1px 5px;border-radius:4px;font-size:11px}
#fbi{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;margin-top:10px;margin-bottom:4px}
#fbc{width:100%;padding:13px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;-webkit-tap-highlight-color:rgba(0,0,0,0.2);touch-action:manipulation}
#fbs{width:100%;padding:10px;background:none;border:1px solid #ddd;border-radius:10px;font-size:13px;cursor:pointer;margin-top:6px;color:#555}
#cbdg{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600}
.con{background:#D4EDDA;color:#155724}.clo{background:#FFF3CD;color:#856404}
.topbar{background:#1a1a1a;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:14px;font-weight:700;letter-spacing:.08em}
.logosub{font-size:10px;opacity:.5;margin-top:1px}
.layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 48px)}
@media(max-width:640px){.layout{grid-template-columns:1fr}.sidebar{display:none}.mobnav{display:flex!important}.main{padding:16px;padding-bottom:80px}}
.sidebar{background:#fff;border-right:1px solid #ebebeb;padding:16px 0;position:sticky;top:48px;height:calc(100vh - 48px);overflow-y:auto}
.nlbl{font-size:10px;font-weight:700;color:#aaa;padding:10px 16px 4px;letter-spacing:.06em}
.nitem{display:flex;align-items:center;gap:8px;padding:10px 16px;cursor:pointer;font-size:13px;color:#555;border:none;background:none;width:100%;text-align:left}
.nitem:hover{background:#f5f5f5;color:#1a1a1a}
.nitem.on{background:#f0f0f0;color:#1a1a1a;font-weight:600;border-right:2px solid #1a1a1a}
.ndiv{height:1px;background:#ebebeb;margin:10px 0}
.main{padding:24px;overflow-y:auto}
.pg{display:none;flex-direction:column;gap:16px}
